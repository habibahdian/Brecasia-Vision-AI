<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brecaresia | Smart Rehab</title>
    
    <!-- PWA Manifest Link -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- PWA Mobile Optimization Meta Tags -->
    <meta name="theme-color" content="#e91e63">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/logo.png">

    <style>
        :root { --pink: #e91e63; --green: #2ecc71; --blue: #0ea5e9; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; }

        /* --- LANDING PAGE --- */
        #landing { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #fff1f2 0%, #f0fdf4 100%); }
        .hero-card { background: white; max-width: 500px; width: 90%; padding: 50px 30px; border-radius: 40px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.1); border-top: 10px solid var(--pink); }
        .logo-img { width: 140px; margin-bottom: 25px; object-fit: contain; }
        .btn-enter { background: var(--green); color: white; padding: 20px 70px; border-radius: 100px; border: none; font-weight: 700; font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(46,204,113,0.2); }

        /* --- DASHBOARD --- */
        #dashboard { display: none; min-height: 100vh; }
        .header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top:0; z-index:100; }
        .header h1 { font-size: 18px; color: var(--blue); margin: 0; font-weight: 700; }

        .container { max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        .panel-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { background: white; border-radius: 24px; padding: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; position: relative; }
        .card-title { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        button.tool { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px; color: #475569; font-size: 10px; font-weight: 700; padding: 10px 14px; margin: 4px; cursor: pointer; transition: 0.2s; }
        button.tool:hover { background: white; border-color: var(--blue); color: var(--blue); }
        .btn-start { background: var(--green) !important; color: white !important; border: none !important; }
        .btn-switch { background: #f0f9ff !important; color: var(--blue) !important; }
        .btn-run { border: 2px dashed var(--blue) !important; color: var(--blue) !important; background: transparent !important; }

        /* VIEWPORT */
        .viewport-box { background: #000; border-radius: 35px; height: 55vh; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 8px solid white; position: relative; }
        #display-img { height: 100%; width: 100%; object-fit: contain; z-index: 10; position: absolute; background: black; }
        
        /* RAW VIDEO (Hidden but active) */
        #video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }

        /* STATS */
        .stats-bar { display: flex; justify-content: space-around; background: white; padding: 25px; border-radius: 24px; margin-top: 25px; border: 1px solid #f1f5f9; }
        .stat-val { font-size: 30px; font-weight: 800; color: var(--green); font-family: monospace; }
        .stat-label { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }

        canvas, input { display: none; }
    </style>
</head>
<body>

    <div id="landing">
        <div class="hero-card">
            <img src="/logo.png" class="logo-img" alt="Logo Brecaresia">
            <h1 style="margin:0; font-size:40px;">Brecaresia</h1>
            <p style="color:var(--pink); font-weight:700; letter-spacing:4px; text-transform:uppercase; margin:10px 0 35px;">AI VisionMotion Rehabilitation</p>
            <p style="color:#64748b; font-size:16px; line-height:1.7; margin-bottom:45px;">
                Goal: Increasing exercise adherence from <b>28% to 70%</b>.
            </p>
            <button class="btn-enter" onclick="openApp()">START REHABILITATION</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1>Brecaresia Analysis Dashboard</h1>
            <img src="/logo.png" height="35" alt="Logo">
        </div>

        <div class="container">
            <div class="panel-row">
                <div class="card">
                    <span class="card-title">Medical File Inference</span>
                    <button class="tool" onclick="pickFile()">Chest expansion</button>
                    <button class="tool" onclick="pickFile()">Hand gripping</button>
                    <button class="tool" onclick="pickFile()">Shoulder circum.</button>
                    <button class="tool" onclick="pickFile()">Upper limb</button>
                    <button class="tool" onclick="pickFile()">Wall walking</button>
                </div>
                <div class="card" style="text-align: center;">
                    <span class="card-title">Live AI Session</span>
                    <button class="tool btn-start" onclick="startLive()">START</button>
                    <button class="tool btn-switch" onclick="switchCamera()">SWITCH CAM</button>
                    <button class="tool" style="color: #ef4444;" onclick="location.reload()">STOP</button>
                </div>
                <div class="card" style="text-align: center;">
                    <span class="card-title">Data Actions</span>
                    <button class="tool btn-run" onclick="alert('Analyzing all files...')">RUN FILES</button>
                    <button class="tool" style="background:#eafaf1; color:var(--green);" onclick="alert('Exporting to Excel...')">REPORT EXCEL</button>
                </div>
            </div>

            <div class="viewport-box">
                <!-- Processed AI frames will be shown here -->
                <img id="display-img" src="">
                <!-- This raw camera element runs in the background -->
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas"></canvas>
                <input type="file" id="file-input" accept="image/*,video/*" onchange="upload()">
            </div>

            <div class="stats-bar">
                <div style="text-align: center;">
                    <div class="stat-label">Hardware Status</div>
                    <div id="device-info" style="font-size: 14px; font-weight: 800; color: #334155;">WAITING...</div>
                </div>
                <div style="text-align: center;">
                    <div class="stat-label">Real-time Area (Pixels²)</div>
                    <div class="stat-val" id="area-val">0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const display = document.getElementById('display-img');
        const areaText = document.getElementById('area-val');
        const deviceText = document.getElementById('device-info');
        let ws;
        let mode = "environment"; 

        function openApp() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function pickFile() { document.getElementById('file-input').click(); }

        async function switchCamera() {
            mode = (mode === "environment") ? "user" : "environment";
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
                startLive();
            }
        }

        async function upload() {
            const formData = new FormData();
            formData.append('file', document.getElementById('file-input').files[0]);
            areaText.innerText = "...";
            try {
                const res = await fetch('/infer-file', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.image) display.src = data.image;
                areaText.innerText = data.area !== undefined ? data.area : "0.00";
                deviceText.innerText = "FILE MODE";
            } catch (error) {
                console.error("Upload error:", error);
                areaText.innerText = "ERROR";
                alert("Failed to process file");
            }
        }

        async function startLive() {
            try {
                const constraints = {
                    video: { 
                        facingMode: mode, 
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    deviceText.innerText = "SESSION INITIALIZING...";
                    startStreaming();
                };

            } catch (err) {
                alert("Camera Error: " + err.message);
                deviceText.innerText = "CAMERA DENIED";
            }
        }

        function startStreaming() {
            // Check protocol for secure WebSocket (wss) vs standard (ws)
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            ws = new WebSocket(protocol + window.location.host + '/ws/video');
            
            ws.onopen = () => {
                deviceText.innerText = "LIVE AI ACTIVE";
                captureAndSend();
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.annotated_image) {
                    // Update viewport with processed AI image
                    display.src = data.annotated_image;
                }
                if (data.area !== undefined) {
                    areaText.innerText = data.area;
                }
            };

            ws.onclose = () => {
                deviceText.innerText = "DISCONNECTED";
            };

            ws.onerror = (err) => {
                console.error("WebSocket Error:", err);
                deviceText.innerText = "CONNECTION ERROR";
            };
        }

        function captureAndSend() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                // Resize hidden canvas to manageable processing size
                canvas.width = 640;
                canvas.height = 480;
                
                // Draw current frame from hidden raw video
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Compress and convert to Base64
                // 0.5 quality provides a balance between clarity and latency
                const dataUrl = canvas.toDataURL('image/jpeg', 0.5); 
                
                // Send the frame to the Python FastAPI server
                ws.send(dataUrl);
                
                // Loop approximately 10-15 times per second
                setTimeout(captureAndSend, 70); 
            }
        }

        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('ServiceWorker registration successful');
                })
                .catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
